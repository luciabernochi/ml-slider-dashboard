<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rabbit Hole — Dashboard Ejecutivo</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<!-- ─── Nav ─────────────────────────────────────────────────────────────────── -->
<nav class="top-nav">
  <div class="nav-brand"><span>◆</span> ML Ads Dashboard</div>
  <a class="nav-link" href="main-sliders.html">Main Sliders</a>
  <a class="nav-link" href="landings.html">Landings</a>
  <a class="nav-link" href="containers.html">Containers</a>
  <a class="nav-link active" href="rabbit-hole.html">Rabbit Hole</a>
  <a class="nav-link" href="placement-pers.html">Placement Pers.</a>
  <a class="nav-link" href="tabs.html">Tabs</a>
</nav>

<!-- ─── Page ─────────────────────────────────────────────────────────────────── -->
<div class="page-wrapper">

  <!-- Header -->
  <div class="page-header">
    <div>
      <div class="page-title">Rabbit Hole</div>
      <div class="page-subtitle">Métricas semanales · últimas 8 semanas</div>
    </div>
    <div id="freshness-badge" class="freshness">
      <span class="freshness-dot" id="freshness-dot"></span>
      <span id="freshness-text">Cargando…</span>
    </div>
  </div>

  <!-- KPI Cards -->
  <div class="kpi-grid" id="kpi-grid">
    <div class="kpi-card"><div class="state-loading">Cargando…</div></div>
    <div class="kpi-card"><div class="state-loading">Cargando…</div></div>
    <div class="kpi-card"><div class="state-loading">Cargando…</div></div>
    <div class="kpi-card"><div class="state-loading">Cargando…</div></div>
    <div class="kpi-card"><div class="state-loading">Cargando…</div></div>
  </div>

</div><!-- /page-wrapper -->

<script type="module">
import {
  fmtNum, fmtPct, calcDelta, deltaBadge, fmtRefreshed
} from '../assets/js/utils.js';

// ─── State ────────────────────────────────────────────────────────────────────
let allData = [];

// ─── Aggregation ──────────────────────────────────────────────────────────────
function aggregateByWeek(rows) {
  const map = new Map();
  for (const r of rows) {
    const key = r.WEEK;
    if (!map.has(key)) map.set(key, { prints: 0, views: 0, clicks: 0, orders: 0, year: r.YEAR_FROM_WEEK });
    const acc = map.get(key);
    acc.prints += Number(r.PRINTS) || 0;
    acc.views  += Number(r.VIEWS)  || 0;
    acc.clicks += Number(r.CLICKS) || 0;
    acc.orders += Number(r.ORDERS) || 0;
  }
  map.forEach(v => { v.ctr = v.prints ? v.clicks / v.prints : 0; });
  return map;
}

function getWeeks(weekMap, yearTag) {
  return [...weekMap.entries()]
    .filter(([, v]) => v.year === yearTag)
    .map(([k]) => k)
    .sort();
}

function getWeeklyKPIs(weekMap) {
  const cyWeeks = getWeeks(weekMap, 'CY');
  if (!cyWeeks.length) return { curr: null, prev: null };
  const currWeek = cyWeeks[cyWeeks.length - 1];
  const prevWeek = cyWeeks.length > 1 ? cyWeeks[cyWeeks.length - 2] : null;
  return {
    curr: { ...weekMap.get(currWeek), week: currWeek },
    prev: prevWeek ? { ...weekMap.get(prevWeek), week: prevWeek } : null,
  };
}

// ─── Load data ────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res  = await fetch('../data-rabbit-hole.json');
    const json = await res.json();
    allData    = json.data || [];

    const ts  = json.refreshed_at;
    const dot = document.getElementById('freshness-dot');
    const txt = document.getElementById('freshness-text');
    if (ts) {
      txt.textContent = 'Actualizado ' + fmtRefreshed(ts);
      dot.className   = 'freshness-dot';
    } else {
      txt.textContent = 'Sin datos';
      dot.className   = 'freshness-dot error';
    }

    render();
  } catch (e) {
    console.error('loadData error:', e);
    document.getElementById('freshness-text').textContent = 'Error al cargar datos';
    document.getElementById('freshness-dot').className    = 'freshness-dot error';
  }
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const weekMap = aggregateByWeek(allData);
  renderKPIs(weekMap);
}

// ─── KPIs ─────────────────────────────────────────────────────────────────────
function renderKPIs(weekMap) {
  const { curr, prev } = getWeeklyKPIs(weekMap);
  const grid = document.getElementById('kpi-grid');

  if (!curr) {
    grid.innerHTML = '<div class="kpi-card"><div class="state-empty">Sin datos para los filtros seleccionados</div></div>';
    return;
  }

  const currCvr = curr.clicks ? curr.orders / curr.clicks : 0;
  const prevCvr = prev?.clicks ? prev.orders / prev.clicks : 0;

  const kpis = [
    { label: 'Clicks',  value: fmtNum(curr.clicks), delta: calcDelta(curr.clicks, prev?.clicks) },
    { label: 'Views',   value: fmtNum(curr.views),  delta: calcDelta(curr.views,  prev?.views)  },
    { label: 'Órdenes', value: fmtNum(curr.orders), delta: calcDelta(curr.orders, prev?.orders) },
    { label: 'CTR',     value: fmtPct(curr.ctr),    delta: calcDelta(curr.ctr,    prev?.ctr)    },
    { label: 'CVR',     value: fmtPct(currCvr),     delta: calcDelta(currCvr,     prevCvr)      },
  ];

  grid.innerHTML = kpis.map(k => `
    <div class="kpi-card">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.value}</div>
      <div class="kpi-footer">
        ${deltaBadge(k.delta)}
        <span>vs semana anterior</span>
      </div>
    </div>
  `).join('');
}


// ─── Init ─────────────────────────────────────────────────────────────────────
loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
