<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabs — Dashboard Ejecutivo</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
  <style>
    .period-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .period-chip {
      font-family: inherit;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-muted);
      transition: all .12s;
      white-space: nowrap;
    }
    .period-chip:hover  { border-color: var(--accent); color: var(--accent); }
    .period-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .btn-reset {
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 5px 12px;
      background: var(--card);
      color: var(--text);
      cursor: pointer;
    }
    .btn-reset:hover { background: var(--bg); }
  </style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-brand"><span>◆</span> ML Home Dashboard</div>
  <a class="nav-link" href="../summary.html">Summary Home</a>
  <a class="nav-link active" href="tabs.html">Tabs</a>
  <a class="nav-link" href="main-sliders.html">Main Sliders</a>
  <a class="nav-link" href="quick-access.html">Quick Access</a>
  <a class="nav-link" href="rabbit-hole.html">Rabbit Hole</a>
  <a class="nav-link" href="../index.html">Summary Placements</a>
</nav>

<div class="page-wrapper">

  <div class="page-header">
    <div>
      <div class="page-title">Tabs</div>
      <div class="page-subtitle">Ranking de tabs · MLA</div>
    </div>
    <div class="freshness">
      <span class="freshness-dot" id="freshness-dot"></span>
      <span id="freshness-text">Cargando…</span>
    </div>
  </div>

  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px;">
    <div class="toggle-group" id="grain-toggle">
      <button data-grain="day">Día</button>
      <button data-grain="week" class="active">Semana</button>
      <button data-grain="month">Mes</button>
    </div>
    <div id="period-selector" style="display:flex;align-items:center;gap:8px;"></div>
  </div>

  <div class="kpi-grid" id="tabs-kpi-grid" style="margin-bottom:20px;">
    <div class="kpi-card"><div class="state-loading">Cargando…</div></div>
    <div class="kpi-card"><div class="state-loading">Cargando…</div></div>
    <div class="kpi-card"><div class="state-loading">Cargando…</div></div>
  </div>

  <div class="section-title" id="tabs-period-label">Ranking por Taps</div>

  <div style="overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-top:12px;">
    <table id="tabs-table" style="width:100%;border-collapse:collapse;font-size:12px;">
      <thead>
        <tr style="background:#2d3748;color:#fff;">
          <th style="width:32px;padding:10px 12px;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.05em;text-align:left;"></th>
          <th style="padding:10px 12px;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.05em;text-align:left;">Tab</th>
          <th style="padding:10px 16px;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.05em;text-align:right;">Taps</th>
          <th style="padding:10px 16px;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.05em;text-align:right;">Views</th>
          <th style="padding:10px 16px;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.05em;text-align:right;">CTR</th>
        </tr>
      </thead>
      <tbody id="tabs-tbody">
        <tr><td colspan="5" style="padding:24px;color:#888;text-align:center;">Cargando…</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script type="module">
import { fmtNum, fmtPct, fmtWeekLabel, fmtRefreshed, calcDelta, deltaBadge } from '../assets/js/utils.js';

let allData        = [];
let currentGrain   = 'week';
let selectedPeriod = null;

async function loadData() {
  try {
    const res  = await fetch('../data-tabs.json');
    const json = await res.json();
    allData = json.data || [];
    const ts = json.refreshed_at;
    document.getElementById('freshness-text').textContent = ts ? 'Actualizado ' + fmtRefreshed(ts) : 'Sin datos';
    document.getElementById('freshness-dot').className   = ts ? 'freshness-dot' : 'freshness-dot error';
    render();
  } catch {
    document.getElementById('freshness-text').textContent = 'Error al cargar datos';
    document.getElementById('freshness-dot').className    = 'freshness-dot error';
  }
}

function keyField() {
  return currentGrain === 'day' ? 'DS' : currentGrain === 'week' ? 'WEEK' : 'MONTH';
}

function getAllPeriods() {
  return [...new Set(allData.map(r => r[keyField()]).filter(Boolean))].sort();
}

function getEffective(all) {
  return (selectedPeriod && all.includes(selectedPeriod)) ? selectedPeriod : all[all.length - 1];
}

function renderPeriodSelector(all, effective) {
  const bar = document.getElementById('period-selector');
  if (currentGrain === 'day') {
    bar.innerHTML = `
      <input type="date" id="day-picker" min="${all[0]}" max="${all[all.length-1]}" value="${effective}"
        style="font-family:inherit;font-size:12px;font-weight:600;border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 10px;background:var(--card);color:var(--text);cursor:pointer;">
      <button class="btn-reset" id="btn-reset">Por defecto</button>`;
    bar.querySelector('#day-picker').addEventListener('change', e => { selectedPeriod = e.target.value || null; render(); });
    bar.querySelector('#btn-reset').addEventListener('click', () => { selectedPeriod = null; render(); });
  } else if (currentGrain === 'week') {
    bar.innerHTML = `
      <select id="week-select" style="font-family:inherit;font-size:12px;font-weight:600;border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 10px;background:var(--card);color:var(--text);cursor:pointer;min-width:150px;">
        ${all.map(p => `<option value="${p}" ${p === effective ? 'selected' : ''}>${fmtPeriodLabel(p)}</option>`).join('')}
      </select>
      <button class="btn-reset" id="btn-reset">Por defecto</button>`;
    bar.querySelector('#week-select').addEventListener('change', e => { selectedPeriod = e.target.value; render(); });
    bar.querySelector('#btn-reset').addEventListener('click', () => { selectedPeriod = null; render(); });
  } else {
    bar.innerHTML = `
      <div class="period-chips">
        ${all.map(p => `<button class="period-chip ${p === effective ? 'active' : ''}" data-period="${p}">${fmtPeriodLabel(p)}</button>`).join('')}
      </div>`;
    bar.querySelectorAll('[data-period]').forEach(btn => {
      btn.addEventListener('click', () => { selectedPeriod = btn.dataset.period; render(); });
    });
  }
}

function fmtPeriodLabel(str) {
  if (!str) return '';
  const d = new Date(str + 'T00:00:00');
  if (currentGrain === 'month') return d.toLocaleDateString('es-AR', { month: 'long', year: 'numeric' });
  if (currentGrain === 'week')  return 'Semana ' + fmtWeekLabel(str);
  return d.toLocaleDateString('es-AR', { weekday: 'short', day: '2-digit', month: 'short' });
}

function aggregate(period) {
  const rows = allData.filter(r => r[keyField()] === period);
  const map  = new Map();
  for (const r of rows) {
    const tab = r.tab || '—';
    if (!map.has(tab)) map.set(tab, { taps: 0, views: 0 });
    map.get(tab).taps  += Number(r.total_taps) || 0;
    map.get(tab).views += Number(r.views)      || 0;
  }
  map.forEach(v => { v.ctr = v.views ? v.taps / v.views : 0; });
  return map;
}

function render() {
  const all       = getAllPeriods();
  if (!all.length) { renderEmpty(); return; }
  const effective  = getEffective(all);
  const prevPeriod = all[all.indexOf(effective) - 1];

  renderPeriodSelector(all, effective);
  document.getElementById('tabs-period-label').textContent = `Ranking por Taps · ${fmtPeriodLabel(effective)}`;

  renderKPIs(effective, prevPeriod);
  renderTable(effective);
}

function renderKPIs(effective, prevPeriod) {
  const grid = document.getElementById('tabs-kpi-grid');
  const curr = [...aggregate(effective).values()].reduce((a, v) => ({ taps: a.taps + v.taps, views: a.views + v.views }), { taps: 0, views: 0 });
  const prev = prevPeriod ? [...aggregate(prevPeriod).values()].reduce((a, v) => ({ taps: a.taps + v.taps, views: a.views + v.views }), { taps: 0, views: 0 }) : null;

  const ctr     = curr.views ? curr.taps / curr.views : 0;
  const prevCtr = prev?.views ? prev.taps / prev.views : 0;

  const kpis = [
    { label: 'Taps',    value: fmtNum(curr.taps),   delta: calcDelta(curr.taps,  prev?.taps)  },
    { label: 'Views',   value: fmtNum(curr.views),   delta: calcDelta(curr.views, prev?.views) },
    { label: 'CTR',     value: fmtPct(ctr),          delta: calcDelta(ctr,        prevCtr)     },
  ];

  grid.innerHTML = kpis.map(k => `
    <div class="kpi-card">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.value}</div>
      <div class="kpi-footer">${deltaBadge(k.delta)}<span>vs período anterior</span></div>
    </div>`).join('');
}

function renderTable(effective) {
  const map = aggregate(effective);
  const sorted = [...map.entries()]
    .map(([tab, v]) => ({ tab, ...v }))
    .sort((a, b) => b.taps - a.taps);

  if (!sorted.length) { renderEmpty(); return; }

  const maxTaps   = sorted[0].taps;
  const maxPrints = Math.max(...sorted.map(r => r.views));
  const maxCtr    = Math.max(...sorted.map(r => r.ctr));
  const ROW_BASE  = 'border-bottom:1px solid #f3f4f8;transition:background .1s;';

  document.getElementById('tabs-tbody').innerHTML = sorted.map((r, i) => {
    const tapBarW   = maxTaps   ? Math.round(r.taps   / maxTaps   * 100) : 0;
    const printBarW = maxPrints ? Math.round(r.views  / maxPrints * 100) : 0;
    const ctrBarW   = maxCtr    ? Math.round(r.ctr    / maxCtr    * 100) : 0;
    return `<tr style="${ROW_BASE}" onmouseover="this.style.background='#fafbff'" onmouseout="this.style.background=''">
      <td style="padding:10px 12px;color:var(--text-muted);font-size:11px;font-weight:600;">${i + 1}.</td>
      <td style="padding:10px 12px;font-weight:600;color:var(--text);">${r.tab}</td>
      <td style="padding:10px 16px;text-align:right;">
        <div style="display:flex;align-items:center;justify-content:flex-end;gap:8px;">
          <span style="font-weight:600;color:var(--text);min-width:52px;text-align:right;">${fmtNum(r.taps)}</span>
          <div style="width:80px;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;">
            <div style="width:${tapBarW}%;height:100%;background:#4299e1;border-radius:3px;"></div>
          </div>
        </div>
      </td>
      <td style="padding:10px 16px;text-align:right;">
        <div style="display:flex;align-items:center;justify-content:flex-end;gap:8px;">
          <span style="font-weight:600;color:var(--text);min-width:52px;text-align:right;">${fmtNum(r.views)}</span>
          <div style="width:80px;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;">
            <div style="width:${printBarW}%;height:100%;background:#f5c800;border-radius:3px;"></div>
          </div>
        </div>
      </td>
      <td style="padding:10px 16px;text-align:right;">
        <div style="display:flex;align-items:center;justify-content:flex-end;gap:8px;">
          <span style="font-weight:600;color:var(--text);min-width:44px;text-align:right;">${fmtPct(r.ctr)}</span>
          <div style="width:60px;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;">
            <div style="width:${ctrBarW}%;height:100%;background:#ed64a6;border-radius:3px;"></div>
          </div>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function renderEmpty() {
  document.getElementById('tabs-tbody').innerHTML =
    '<tr><td colspan="5" style="padding:24px;color:#888;text-align:center;">Sin datos</td></tr>';
}

document.getElementById('grain-toggle').addEventListener('click', e => {
  const btn = e.target.closest('[data-grain]');
  if (!btn) return;
  currentGrain   = btn.dataset.grain;
  selectedPeriod = null;
  document.querySelectorAll('#grain-toggle button').forEach(b => b.classList.toggle('active', b === btn));
  render();
});

loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
