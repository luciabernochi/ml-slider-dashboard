<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rabbit Hole — Dashboard Ejecutivo</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <style>
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 20px;
    }
    @media (max-width: 1000px) { .charts-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px)  { .charts-grid { grid-template-columns: 1fr; } }

    .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
    .chart-card-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px 10px; }
    .chart-card-title { font-size: 12px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: .5px; }
    .chart-badge { display: flex; gap: 6px; align-items: center; }
    .chart-card-body { padding: 4px 14px 14px; }
    .chart-canvas-wrap { position: relative; height: 180px; }

    .period-selector-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .period-selector-bar label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    #day-picker {
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 5px 10px;
      background: var(--card);
      color: var(--text);
      cursor: pointer;
    }
    #week-select {
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 5px 10px;
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      min-width: 140px;
    }
  </style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-brand"><span>◆</span> ML Home Dashboard</div>
  <a class="nav-link" href="../summary.html">Summary Home</a>
  <a class="nav-link" href="tabs.html">Tabs</a>
  <a class="nav-link" href="main-sliders.html">Main Sliders</a>
  <a class="nav-link" href="quick-access.html">Quick Access</a>
  <a class="nav-link active" href="rabbit-hole.html">Rabbit Hole</a>
  <a class="nav-link" href="../index.html">Summary Placements</a>
</nav>

<div class="page-wrapper">

  <div class="page-header">
    <div>
      <div class="page-title">Rabbit Hole</div>
      <div class="page-subtitle">Clicks, Views, Órdenes, NMV, CTR y CVR · MLA</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <div class="toggle-group" id="cbt-toggle">
        <button data-cbt="all" class="active">Total</button>
        <button data-cbt="false">No CBT</button>
        <button data-cbt="true">CBT</button>
      </div>
      <div class="toggle-group" id="grain-toggle">
        <button data-grain="day">Día</button>
        <button data-grain="week" class="active">Semana</button>
        <button data-grain="month">Mes</button>
      </div>
      <div class="freshness">
        <span class="freshness-dot" id="freshness-dot"></span>
        <span id="freshness-text">Cargando…</span>
      </div>
    </div>
  </div>

  <!-- Period selector -->
  <div class="period-selector-bar" id="period-selector-bar"></div>

  <!-- KPI Cards -->
  <div class="section-title" style="margin-bottom:12px;">Overall Performance</div>
  <div class="kpi-grid" id="kpi-grid">
    <div class="kpi-card"><div class="state-loading">Cargando…</div></div>
    <div class="kpi-card"><div class="state-loading">Cargando…</div></div>
    <div class="kpi-card"><div class="state-loading">Cargando…</div></div>
    <div class="kpi-card"><div class="state-loading">Cargando…</div></div>
    <div class="kpi-card"><div class="state-loading">Cargando…</div></div>
    <div class="kpi-card"><div class="state-loading">Cargando…</div></div>
  </div>

  <!-- Charts 3x2 -->
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-card-header"><span class="chart-card-title">Clicks</span><div class="chart-badge" id="badge-clicks"></div></div>
      <div class="chart-card-body"><div class="chart-canvas-wrap"><canvas id="chart-clicks"></canvas></div></div>
    </div>
    <div class="chart-card">
      <div class="chart-card-header"><span class="chart-card-title">Views</span><div class="chart-badge" id="badge-views"></div></div>
      <div class="chart-card-body"><div class="chart-canvas-wrap"><canvas id="chart-views"></canvas></div></div>
    </div>
    <div class="chart-card">
      <div class="chart-card-header"><span class="chart-card-title">Órdenes</span><div class="chart-badge" id="badge-orders"></div></div>
      <div class="chart-card-body"><div class="chart-canvas-wrap"><canvas id="chart-orders"></canvas></div></div>
    </div>
    <div class="chart-card">
      <div class="chart-card-header"><span class="chart-card-title">NMV</span><div class="chart-badge" id="badge-nmv"></div></div>
      <div class="chart-card-body"><div class="chart-canvas-wrap"><canvas id="chart-nmv"></canvas></div></div>
    </div>
    <div class="chart-card">
      <div class="chart-card-header"><span class="chart-card-title">CTR</span><div class="chart-badge" id="badge-ctr"></div></div>
      <div class="chart-card-body"><div class="chart-canvas-wrap"><canvas id="chart-ctr"></canvas></div></div>
    </div>
    <div class="chart-card">
      <div class="chart-card-header"><span class="chart-card-title">CVR</span><div class="chart-badge" id="badge-cvr"></div></div>
      <div class="chart-card-body"><div class="chart-canvas-wrap"><canvas id="chart-cvr"></canvas></div></div>
    </div>
  </div>

</div>

<script type="module">
import {
  fmtNum, fmtPct, fmtUSD, calcDelta, deltaBadge, fmtWeekLabel, fmtRefreshed
} from '../assets/js/utils.js';

Chart.register(ChartDataLabels);

const YELLOW      = '#f5c800';
const YELLOW_FILL = 'rgba(245,200,0,.12)';
const FONT        = { family: "'Proxima Nova','proxima-nova','Segoe UI',sans-serif", size: 11 };
const N_SHOWN     = { day: 10, week: 8, month: null };

let allData       = [];
let currentGrain  = 'week';
let currentCbt    = 'all';
let selectedPeriod = null;
const charts      = {};

// ── Load ──────────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res  = await fetch('../data-rabbit-hole.json');
    const json = await res.json();
    allData = json.data || [];
    const ts = json.refreshed_at;
    document.getElementById('freshness-text').textContent = ts ? 'Actualizado ' + fmtRefreshed(ts) : 'Sin datos';
    document.getElementById('freshness-dot').className   = ts ? 'freshness-dot' : 'freshness-dot error';
    render();
  } catch {
    document.getElementById('freshness-text').textContent = 'Error al cargar datos';
    document.getElementById('freshness-dot').className    = 'freshness-dot error';
  }
}

// ── Filter + Aggregate ────────────────────────────────────────────────────────
function filterByCbt(data) {
  if (currentCbt === 'all')  return data;
  if (currentCbt === 'true') return data.filter(r => r.CBT_FLAG === true);
  return data.filter(r => r.CBT_FLAG === false);
}

function aggregate(data) {
  const keyField = currentGrain === 'day' ? 'DS' : currentGrain === 'week' ? 'WEEK' : 'MONTH';
  const map = new Map();
  for (const r of data) {
    const key = r[keyField];
    if (!map.has(key)) map.set(key, { clicks: 0, prints: 0, views: 0, orders: 0, nmv: 0 });
    const acc = map.get(key);
    acc.clicks += Number(r.CLICKS) || 0;
    acc.prints += Number(r.PRINTS) || 0;
    acc.views  += Number(r.VIEWS)  || 0;
    acc.orders += Number(r.ORDERS) || 0;
    acc.nmv    += Number(r.NMV)    || 0;
  }
  map.forEach(v => {
    v.ctr = v.prints ? v.clicks / v.prints : 0;
    v.cvr = v.clicks ? v.orders / v.clicks : 0;
  });
  return map;
}

function getAllPeriods(map) {
  return [...map.keys()].sort();
}

function getEffectivePeriod(all) {
  if (selectedPeriod && all.includes(selectedPeriod)) return selectedPeriod;
  return all[all.length - 1];
}

function getChartPeriods(all, effectivePeriod) {
  const endIdx = all.indexOf(effectivePeriod);
  const n = N_SHOWN[currentGrain];
  const startIdx = n ? Math.max(0, endIdx - n + 1) : 0;
  return all.slice(startIdx, endIdx + 1);
}

function fmtPeriodLabel(str) {
  const d = new Date(str + 'T00:00:00');
  if (currentGrain === 'month') return d.toLocaleDateString('es-AR', { month: 'long', year: 'numeric' });
  if (currentGrain === 'week')  return 'Semana ' + fmtWeekLabel(str);
  return d.toLocaleDateString('es-AR', { weekday: 'short', day: '2-digit', month: 'short' });
}

function fmtAxisLabel(str) {
  const d = new Date(str + 'T00:00:00');
  if (currentGrain === 'month') return d.toLocaleDateString('es-AR', { month: 'short', year: '2-digit' });
  return fmtWeekLabel(str);
}

// ── Period Selector ───────────────────────────────────────────────────────────
function renderPeriodSelector(map) {
  const bar = document.getElementById('period-selector-bar');
  const all = getAllPeriods(map);
  const effective = getEffectivePeriod(all);

  if (currentGrain === 'day') {
    bar.innerHTML = `
      <label>Día</label>
      <input type="date" id="day-picker" min="${all[0]}" max="${all[all.length - 1]}" value="${effective}">
      <button class="btn-reset" id="btn-reset-day">Último día</button>
    `;
    bar.querySelector('#day-picker').addEventListener('change', e => {
      selectedPeriod = e.target.value || null;
      render();
    });
    bar.querySelector('#btn-reset-day').addEventListener('click', () => {
      selectedPeriod = null;
      render();
    });

  } else if (currentGrain === 'week') {
    bar.innerHTML = `
      <label>Semana</label>
      <select id="week-select">
        ${all.map(p => `<option value="${p}" ${p === effective ? 'selected' : ''}>${fmtPeriodLabel(p)}</option>`).join('')}
      </select>
      <button class="btn-reset" id="btn-reset-week">Última semana</button>
    `;
    bar.querySelector('#week-select').addEventListener('change', e => {
      selectedPeriod = e.target.value;
      render();
    });
    bar.querySelector('#btn-reset-week').addEventListener('click', () => {
      selectedPeriod = null;
      render();
    });

  } else {
    bar.innerHTML = '';
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const map       = aggregate(filterByCbt(allData));
  const all       = getAllPeriods(map);
  if (!all.length) return;

  const effective = getEffectivePeriod(all);
  const chartPeriods = getChartPeriods(all, effective);
  const effectiveIdx = all.indexOf(effective);
  const prevPeriod   = effectiveIdx > 0 ? all[effectiveIdx - 1] : null;

  renderPeriodSelector(map);
  renderKPIs(map, effective, prevPeriod);
  renderChart('chart-clicks',  'badge-clicks',  map, chartPeriods, effective, 'clicks',  fmtNum,  false);
  renderChart('chart-views',   'badge-views',   map, chartPeriods, effective, 'views',   fmtNum,  false);
  renderChart('chart-orders',  'badge-orders',  map, chartPeriods, effective, 'orders',  fmtNum,  false);
  renderChart('chart-nmv',     'badge-nmv',     map, chartPeriods, effective, 'nmv',     fmtUSD,  false);
  renderChart('chart-ctr',     'badge-ctr',     map, chartPeriods, effective, 'ctr',     fmtPct,  true);
  renderChart('chart-cvr',     'badge-cvr',     map, chartPeriods, effective, 'cvr',     fmtPct,  true);
}

function renderKPIs(map, effective, prevPeriod) {
  const grid = document.getElementById('kpi-grid');
  const curr = map.get(effective);
  const prev = prevPeriod ? map.get(prevPeriod) : null;
  if (!curr) { grid.innerHTML = '<div class="kpi-card"><div class="state-empty">Sin datos</div></div>'; return; }

  const kpis = [
    { label: 'Clicks',  value: fmtNum(curr.clicks), delta: calcDelta(curr.clicks, prev?.clicks) },
    { label: 'Views',   value: fmtNum(curr.views),  delta: calcDelta(curr.views,  prev?.views)  },
    { label: 'Órdenes', value: fmtNum(curr.orders), delta: calcDelta(curr.orders, prev?.orders) },
    { label: 'NMV',     value: fmtUSD(curr.nmv),    delta: calcDelta(curr.nmv,    prev?.nmv)    },
    { label: 'CTR',     value: fmtPct(curr.ctr),    delta: calcDelta(curr.ctr,    prev?.ctr)    },
    { label: 'CVR',     value: fmtPct(curr.cvr),    delta: calcDelta(curr.cvr,    prev?.cvr)    },
  ];
  grid.innerHTML = kpis.map(k => `
    <div class="kpi-card">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.value}</div>
      <div class="kpi-footer">${deltaBadge(k.delta)}<span>vs período anterior</span></div>
    </div>`).join('');
}

function renderBadge(badgeId, map, chartPeriods, metric, fmtFn, isPct) {
  const el = document.getElementById(badgeId);
  if (!el || chartPeriods.length < 2) { if (el) el.innerHTML = ''; return; }
  const last  = map.get(chartPeriods[chartPeriods.length - 1])?.[metric] ?? 0;
  const prev  = map.get(chartPeriods[chartPeriods.length - 2])?.[metric] ?? 0;
  const delta = calcDelta(last, prev);
  const sign  = delta.pct > 0 ? '+' : '';
  const pct   = delta.pct != null ? sign + (delta.pct * 100).toFixed(0) + '%' : '—';
  const color = delta.dir === 'up' ? 'var(--up)' : delta.dir === 'dn' ? 'var(--dn)' : '#888';
  const bg    = delta.dir === 'up' ? 'var(--up-bg)' : delta.dir === 'dn' ? 'var(--dn-bg)' : '#f1f2f6';
  el.innerHTML = `
    <span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:3px;background:${bg};color:${color}">${pct}</span>
    <span style="font-size:11px;color:var(--text-muted)">${fmtFn(last)}</span>`;
}

function renderChart(canvasId, badgeId, map, chartPeriods, effective, metric, fmtFn, isPct) {
  const labels = chartPeriods.map(p => fmtAxisLabel(p));
  const data   = chartPeriods.map(p => {
    const v = map.get(p)?.[metric] ?? 0;
    return isPct ? +(v * 100).toFixed(4) : v;
  });

  renderBadge(badgeId, map, chartPeriods, metric, fmtFn, isPct);

  const pointColors = chartPeriods.map(p => p === effective ? '#e53e3e' : YELLOW);
  const pointSizes  = chartPeriods.map(p => p === effective ? 6 : 4);

  const config = {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data,
        borderColor: YELLOW,
        backgroundColor: YELLOW_FILL,
        borderWidth: 2,
        pointRadius: pointSizes,
        pointBackgroundColor: pointColors,
        tension: 0.3,
        fill: true,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { top: 24 } },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => ' ' + fmtFn(isPct ? c.parsed.y / 100 : c.parsed.y) } },
        datalabels: {
          display: 'auto',
          align: 'top',
          anchor: 'end',
          color: c => chartPeriods[c.dataIndex] === effective ? '#e53e3e' : '#555',
          font: c => ({ ...FONT, weight: chartPeriods[c.dataIndex] === effective ? '700' : '600' }),
          formatter: v => fmtFn(isPct ? v / 100 : v),
        },
      },
      scales: {
        x: { grid: { color: '#eaecf5' }, ticks: { font: FONT, maxRotation: 0 } },
        y: {
          grid: { color: '#eaecf5' },
          ticks: { font: FONT, callback: v => isPct ? v.toFixed(2) + '%' : fmtFn(v) },
          beginAtZero: false,
        },
      },
    },
  };

  if (charts[canvasId]) {
    charts[canvasId].data.labels                          = labels;
    charts[canvasId].data.datasets[0].data                = data;
    charts[canvasId].data.datasets[0].pointBackgroundColor = pointColors;
    charts[canvasId].data.datasets[0].pointRadius          = pointSizes;
    charts[canvasId].update('active');
  } else {
    charts[canvasId] = new Chart(document.getElementById(canvasId).getContext('2d'), config);
  }
}

// ── Toggles ───────────────────────────────────────────────────────────────────
document.getElementById('grain-toggle').addEventListener('click', e => {
  const btn = e.target.closest('[data-grain]');
  if (!btn) return;
  currentGrain   = btn.dataset.grain;
  selectedPeriod = null;
  document.querySelectorAll('#grain-toggle button').forEach(b => b.classList.toggle('active', b === btn));
  render();
});

document.getElementById('cbt-toggle').addEventListener('click', e => {
  const btn = e.target.closest('[data-cbt]');
  if (!btn) return;
  currentCbt = btn.dataset.cbt;
  document.querySelectorAll('#cbt-toggle button').forEach(b => b.classList.toggle('active', b === btn));
  render();
});

loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
